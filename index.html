<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPA PRO V9</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-blue': '#00f3ff',
                        'neon-purple': '#bc13fe',
                        'neon-pink': '#ff00ff',
                        'glass': 'rgba(255, 255, 255, 0.05)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5), 0 0 20px rgba(0, 243, 255, 0.3);
        }

        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDXZA2LZAGy1kkHrQI2vlS7g0Ox-YkWVjU",
            authDomain: "cpa-pro.firebaseapp.com",
            projectId: "cpa-pro",
            storageBucket: "cpa-pro.firebasestorage.app",
            messagingSenderId: "242589630848",
            appId: "1:242589630848:web:94cd5bc893ee9ecd460165",
            measurementId: "G-6VTPS7F9NN"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Icon Component ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons({
                        root: iconRef.current,
                        name: name,
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // --- Main App Component ---
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('home');
            
            // Auth States
            const [authMode, setAuthMode] = useState('login'); // login, register
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [error, setError] = useState('');

            // Data States
            const [jobs, setJobs] = useState([
                { id: 1, title: 'Visit Partner Site', points: 10, type: 'HIGH CPM' },
                { id: 2, title: 'Watch Video Ad', points: 15, type: 'VIDEO' },
                { id: 3, title: 'Install App (Beta)', points: 50, type: 'PRO' },
            ]);

            // Auth Listener
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
                    if (currentUser) {
                        // Fetch user data from Firestore
                        const docRef = db.collection('users').doc(currentUser.uid);
                        const docSnap = await docRef.get();
                        
                        if (docSnap.exists) {
                            setUser({ id: currentUser.uid, ...docSnap.data() });
                        } else {
                            // Create new user doc if not exists
                            const newUser = {
                                name: currentUser.displayName || name || 'User',
                                email: currentUser.email,
                                points: 50, // Signup bonus
                                referralCode: Math.random().toString(36).substring(2, 8).toUpperCase(),
                                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.uid}`,
                                joinedAt: new Date().toISOString()
                            };
                            await docRef.set(newUser);
                            setUser({ id: currentUser.uid, ...newUser });
                        }
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Handlers
            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    // Update profile
                    if (auth.currentUser) {
                        await auth.currentUser.updateProfile({ displayName: name });
                    }
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                }
            };

            const handleLogout = () => {
                auth.signOut();
            };

            const handleTask = (points) => {
                if (!user) return;
                const newPoints = user.points + points;
                
                // Optimistic update
                setUser(prev => ({ ...prev, points: newPoints }));
                
                // Firestore update
                db.collection('users').doc(user.id).update({
                    points: newPoints
                });
                
                alert(`অভিনন্দন! আপনি ${points} পয়েন্ট পেয়েছেন।`);
            };

            // --- Render: Loading ---
            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-black">
                        <div className="w-10 h-10 border-4 border-neon-blue border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            // --- Render: Auth Screen ---
            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
                        {/* Background Effects */}
                        <div className="absolute top-0 left-0 w-full h-full bg-[url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-20"></div>
                        <div className="absolute top-[-10%] right-[-10%] w-64 h-64 bg-neon-blue/20 rounded-full blur-[80px]"></div>
                        <div className="absolute bottom-[-10%] left-[-10%] w-64 h-64 bg-neon-purple/20 rounded-full blur-[80px]"></div>

                        <div className="glass-card w-full max-w-sm p-8 rounded-3xl relative z-10 animate-float">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-gradient-to-tr from-neon-blue to-neon-purple rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-neon-blue/20">
                                    <Icon name="zap" size={32} className="text-white" />
                                </div>
                                <h1 className="text-3xl font-black italic tracking-tighter text-white">CPA PRO <span className="text-neon-blue">V9</span></h1>
                                <p className="text-xs text-white/50 uppercase tracking-widest mt-2">Traffic & Earning Engine</p>
                            </div>

                            {error && (
                                <div className="bg-red-500/10 border border-red-500/20 text-red-500 text-xs p-3 rounded-xl mb-4 text-center font-bold">
                                    {error}
                                </div>
                            )}

                            <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-4">
                                {authMode === 'register' && (
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase font-bold text-white/40 ml-1">Full Name</label>
                                        <input 
                                            type="text" 
                                            required
                                            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:border-neon-blue outline-none transition-colors"
                                            placeholder="John Doe"
                                            value={name}
                                            onChange={e => setName(e.target.value)}
                                        />
                                    </div>
                                )}
                                
                                <div className="space-y-1">
                                    <label className="text-[10px] uppercase font-bold text-white/40 ml-1">Email Address</label>
                                    <input 
                                        type="email" 
                                        required
                                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:border-neon-blue outline-none transition-colors"
                                        placeholder="name@example.com"
                                        value={email}
                                        onChange={e => setEmail(e.target.value)}
                                    />
                                </div>

                                <div className="space-y-1">
                                    <label className="text-[10px] uppercase font-bold text-white/40 ml-1">Password</label>
                                    <input 
                                        type="password" 
                                        required
                                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:border-neon-blue outline-none transition-colors"
                                        placeholder="••••••••"
                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                    />
                                </div>

                                <button 
                                    type="submit"
                                    className="w-full bg-gradient-to-r from-neon-blue to-neon-purple text-white font-black uppercase tracking-widest py-4 rounded-xl shadow-lg shadow-neon-blue/20 hover:scale-[1.02] active:scale-[0.98] transition-all mt-4"
                                >
                                    {authMode === 'login' ? 'Login Account' : 'Create Account'}
                                </button>
                            </form>

                            <div className="mt-6 text-center">
                                <p className="text-xs text-white/40 font-medium">
                                    {authMode === 'login' ? "Don't have an account?" : "Already have an account?"}
                                    <button 
                                        onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')}
                                        className="ml-2 text-neon-blue font-bold hover:underline"
                                    >
                                        {authMode === 'login' ? 'Register' : 'Login'}
                                    </button>
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Render: Main App ---
            return (
                <div className="min-h-screen bg-black pb-24 relative">
                    {/* Header */}
                    <div className="sticky top-0 z-50 glass-card border-t-0 border-x-0 rounded-b-3xl px-6 py-4 mb-6">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="relative">
                                    <img src={user.avatar} className="w-10 h-10 rounded-full border-2 border-neon-blue p-0.5" alt="Profile" />
                                    <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-black"></div>
                                </div>
                                <div>
                                    <h2 className="font-bold text-sm text-white">{user.name}</h2>
                                    <div className="flex items-center gap-1">
                                        <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                        <span className="text-[10px] text-green-500 font-bold uppercase tracking-widest">Online</span>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-gradient-to-r from-yellow-500 to-orange-600 px-4 py-2 rounded-xl shadow-lg shadow-orange-500/20 flex items-center gap-2">
                                <Icon name="wallet" size={16} className="text-white" />
                                <span className="font-black text-sm text-white">{user.points.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>

                    {/* Content Area */}
                    <div className="px-4 max-w-md mx-auto space-y-6">
                        
                        {/* HOME TAB */}
                        {activeTab === 'home' && (
                            <div className="space-y-6 animate-fade-in">
                                {/* Hero Banner */}
                                <div className="glass-card rounded-3xl p-6 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-neon-blue/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                                    <div className="relative z-10 text-center">
                                        <div className="w-14 h-14 bg-white/5 rounded-2xl mx-auto flex items-center justify-center mb-4 border border-white/10">
                                            <Icon name="crown" size={28} className="text-yellow-400" />
                                        </div>
                                        <h1 className="text-3xl font-black italic text-white mb-1">CPA PRO</h1>
                                        <p className="text-[10px] text-white/40 font-black uppercase tracking-[0.3em] mb-6">Premium Traffic Engine</p>
                                        <button 
                                            onClick={() => setActiveTab('exchange')}
                                            className="bg-white/10 hover:bg-white/20 border border-white/10 px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all"
                                        >
                                            Start Campaign
                                        </button>
                                    </div>
                                </div>

                                {/* Stats Grid */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-card p-5 rounded-2xl">
                                        <p className="text-[10px] text-white/40 font-bold uppercase mb-1">Total Earning</p>
                                        <p className="text-2xl font-black text-white">{user.points.toFixed(2)}</p>
                                    </div>
                                    <div className="glass-card p-5 rounded-2xl">
                                        <p className="text-[10px] text-white/40 font-bold uppercase mb-1">Tasks Done</p>
                                        <p className="text-2xl font-black text-white">0</p>
                                    </div>
                                </div>

                                {/* Job List */}
                                <div className="space-y-4">
                                    <div className="flex items-center gap-2">
                                        <div className="w-1 h-5 bg-neon-blue rounded-full"></div>
                                        <h3 className="font-bold text-lg text-white">Available Tasks</h3>
                                    </div>

                                    {jobs.map(job => (
                                        <div key={job.id} className="glass-card p-5 rounded-2xl flex items-center justify-between group hover:border-neon-blue/30 transition-colors">
                                            <div className="flex items-center gap-4">
